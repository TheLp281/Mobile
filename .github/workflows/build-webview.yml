name: Build React Native APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-11-jdk curl wget unzip

      - name: Install Node.js using NVM
        run: |
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.3/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install --lts

      - name: Install Android SDK
        run: |
          ANDROID_SDK_URL="https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip"
          SDK_DIR="$HOME/Android/Sdk"
          mkdir -p "$SDK_DIR/cmdline-tools"
          wget -q "$ANDROID_SDK_URL" -O cmdline-tools.zip
          unzip cmdline-tools.zip -d "$SDK_DIR/cmdline-tools"
          mv "$SDK_DIR/cmdline-tools/cmdline-tools" "$SDK_DIR/cmdline-tools/latest"
          rm cmdline-tools.zip
          echo "export ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
          echo "export PATH=$SDK_DIR/cmdline-tools/latest/bin:$SDK_DIR/platform-tools:$SDK_DIR/emulator:$PATH" >> $GITHUB_ENV

      - name: Load environment variables
        run: source $GITHUB_ENV

      - name: Accept Android licenses
        run: |
          export ANDROID_HOME="$HOME/Android/Sdk"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$PATH"
          yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          export ANDROID_HOME="$HOME/Android/Sdk"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$PATH"
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Create React Native WebView App
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          npx @react-native-community/cli init LiventCord
          cd LiventCord
          echo "sdk.dir=$HOME/Android/Sdk" > android/local.properties
          npm install react-native-webview

      - name: Add SafeAreaView WebView Component
        run: |
          cd LiventCord
          cat <<EOF > App.js
          import React from 'react';
          import { SafeAreaView, StyleSheet, StatusBar, Platform } from 'react-native';
          import { WebView } from 'react-native-webview';

          const App = () => {
            return (
              <SafeAreaView style={styles.safeArea}>
                <StatusBar
                  translucent
                  backgroundColor="transparent"
                  barStyle="dark-content"
                />
                <WebView
                  source={{ uri: 'https://liventcord.github.io/LiventCord/app' }}
                  style={styles.webview}
                />
              </SafeAreaView>
            );
          };

          const styles = StyleSheet.create({
            safeArea: {
              flex: 1,
              paddingTop: Platform.OS === 'android' ? StatusBar.currentHeight : 0,
            },
            webview: {
              flex: 1,
            },
          });

          export default App;
          EOF
      - name: Configure gradle.properties
        run: |
          cd LiventCord
          cat <<EOF >> android/gradle.properties

          # Disable Hermes and New Architecture to avoid NDK/CMake errors
          newArchEnabled=false
          HermesEnabled=false
          EOF
      - name: Modify AndroidManifest.xml for fullscreen layout
        run: |
          cd LiventCord
          sed -i '/<application/a \        android:usesCleartextTraffic="true"' android/app/src/main/AndroidManifest.xml
          sed -i 's/android:theme="@style\/AppTheme"/android:theme="@style\/AppTheme.NoActionBar"/' android/app/src/main/AndroidManifest.xml
          sed -i 's/<activity /<activity android:exported="true" android:theme="@style\/Theme.AppCompat.Light.NoActionBar.FullScreen" /' android/app/src/main/AndroidManifest.xml

      - name: Generate keystore
        run: |
          cd LiventCord
          keytool -genkeypair -v -storetype PKCS12 -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias my-key-alias -dname "CN=Your Name, OU=Your Org, O=Your Company, L=Your City, S=Your State, C=Your Country" -storepass yourpassword -keypass yourpassword
          mv my-release-key.jks android/app/

      - name: Configure Gradle signing
        run: |
          cd LiventCord
          cat <<EOF >> android/app/build.gradle

          android {
              signingConfigs {
                  release {
                      storeFile file('my-release-key.jks')
                      storePassword 'yourpassword'
                      keyAlias 'my-key-alias'
                      keyPassword 'yourpassword'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                  }
              }
          }
          EOF

      - name: Build release APK
        run: |
          cd LiventCord/android
          ./gradlew assembleRelease

      - name: Upload release to GitHub
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ inputs.version }}
          tag_name: v${{ inputs.version }}
          files: LiventCord/android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
